name: Sync org profile README

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'scripts/sync-readme.ts'
      - '.github/workflows/sync-org-readme.yml'
  workflow_dispatch:

concurrency:
  group: sync-org-readme
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Generate App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SYNC_APP_ID }}
          private-key: ${{ secrets.SYNC_APP_PRIVATE_KEY }}
          owner: apps-in-toss-community
          repositories: .github

      - uses: actions/checkout@v4
        with:
          path: source

      - uses: actions/checkout@v4
        with:
          repository: apps-in-toss-community/.github
          token: ${{ steps.app-token.outputs.token }}
          path: dotgithub
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: source/package.json

      - uses: actions/setup-node@v4
        with:
          node-version-file: source/.nvmrc
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Install source deps
        working-directory: source
        run: pnpm install --frozen-lockfile

      - name: Generate READMEs
        working-directory: source
        run: pnpm sync:readme --out ../dotgithub/profile

      - name: Commit and push if changed
        working-directory: dotgithub
        run: |
          git config user.name 'ait-community-sync-bot[bot]'
          git config user.email '${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

          if git diff --quiet && git diff --cached --quiet; then
            echo "No README changes"
            exit 0
          fi

          git add profile/README.md profile/README.en.md
          git commit -m "chore: sync profile README from homepage $GITHUB_SHA"
          git push
